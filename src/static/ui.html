<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f13;
      --surface: #11161c;
      --surface2: #181e26;
      --border: #1e2832;
      --border2: #263040;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --accent: #14b8a6;
      --accent-dim: #0d9488;
      --accent-glow: rgba(20,184,166,0.15);
      --badge-mod-bg: rgba(251,146,60,0.15);
      --badge-mod-text: #fb923c;
      --badge-mod-border: rgba(251,146,60,0.3);
      --badge-new-bg: rgba(34,197,94,0.15);
      --badge-new-text: #4ade80;
      --badge-new-border: rgba(34,197,94,0.3);
      --badge-inv-bg: rgba(99,102,241,0.15);
      --badge-inv-text: #a5b4fc;
      --badge-inv-border: rgba(99,102,241,0.3);
      --error-bg: rgba(239,68,68,0.1);
      --error-border: rgba(239,68,68,0.4);
      --error-text: #f87171;
      --radius: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header .logo { display: flex; align-items: center; gap: 8px; }
    header .logo svg { color: var(--accent); }
    header h1 { font-size: 14px; font-weight: 600; color: var(--text); }
    header .badge {
      font-size: 10px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(20,184,166,0.3);
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 500;
    }
    header .spacer { flex: 1; }
    header a { font-size: 12px; color: var(--text-muted); text-decoration: none; }
    header a:hover { color: var(--accent); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── FORM PANEL ── */
    .form-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input[type="password"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    select option { background: var(--surface2); }

    textarea {
      resize: vertical;
      min-height: 160px;
      font-size: 13px;
      line-height: 1.5;
    }

    .file-input-wrapper input[type="file"] {
      width: 100%;
      padding: 6px;
      font-size: 12px;
      border: 1px dashed var(--border2);
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--surface2);
      color: var(--text-muted);
    }
    .file-input-wrapper input[type="file"]:hover { border-color: var(--accent); }
    #imagePreview {
      margin-top: 8px;
      max-width: 100%;
      max-height: 100px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: none;
      object-fit: contain;
    }

    .btn-row { display: flex; gap: 8px; align-items: center; }
    button[type="submit"] {
      flex: 1;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button[type="submit"]:hover:not(:disabled) { background: var(--accent-dim); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    #clearBtn {
      padding: 9px 12px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #clearBtn:hover { border-color: var(--text-muted); color: var(--text); }

    #elapsed { font-size: 11px; color: var(--text-muted); }

    /* ── CHIPS ── */
    .meta-chips { display: flex; flex-direction: column; gap: 6px; }
    .chips-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: var(--font-mono);
    }
    .chip-repo {
      background: rgba(20,184,166,0.1);
      color: var(--accent);
      border: 1px solid rgba(20,184,166,0.25);
    }
    .chip-file {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── PLAN HEADER ── */
    .plan-header {
      padding: 16px 20px 0;
      flex-shrink: 0;
    }
    .plan-header-inner {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .plan-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent);
    }
    #planTitle {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── TABS ── */
    .tabs-bar {
      display: flex;
      gap: 0;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      margin-top: 12px;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text-dim); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── TAB CONTENT ── */
    .tabs-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .tab-pane {
      display: none;
      height: 100%;
      overflow-y: auto;
    }
    .tab-pane.active { display: flex; flex-direction: column; }

    /* ── PLACEHOLDER ── */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .placeholder svg { opacity: 0.25; }
    .placeholder p { font-size: 13px; }

    /* ── LOADING ── */
    .loading-bar {
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 25%, transparent 75%) -100px 0;
      background-size: 200px 100%;
      animation: loading 1.2s linear infinite;
      display: none;
    }
    .loading-bar.active { display: block; }
    @keyframes loading { to { background-position: 200px 0; } }

    /* ── ERROR ── */
    .error-banner {
      margin: 16px 20px;
      padding: 12px 14px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--radius);
      color: var(--error-text);
      font-size: 13px;
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── FALLBACK BANNER ── */
    .fallback-banner {
      margin: 12px 20px 0;
      padding: 10px 14px;
      background: rgba(251,146,60,0.1);
      border: 1px solid rgba(251,146,60,0.3);
      border-radius: var(--radius);
      color: #fb923c;
      font-size: 12px;
      display: none;
    }
    .fallback-banner.visible { display: block; }

    /* ══════════════════════════════
       TAB: COMPONENTES
    ══════════════════════════════ */
    #tab-components {
      padding: 20px;
      gap: 20px;
    }

    .comp-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .repo-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
    .repo-card {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .repo-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .repo-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-mono);
    }
    .repo-card-project {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .repo-card-reason {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
    }
    .badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge-mod  { background: var(--badge-mod-bg);  color: var(--badge-mod-text);  border: 1px solid var(--badge-mod-border); }
    .badge-new  { background: var(--badge-new-bg);  color: var(--badge-new-text);  border: 1px solid var(--badge-new-border); }
    .badge-inv  { background: var(--badge-inv-bg);  color: var(--badge-inv-text);  border: 1px solid var(--badge-inv-border); }

    .comp-list { display: flex; flex-direction: column; gap: 4px; }
    .comp-list-item {
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    .comp-empty {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ══════════════════════════════
       TAB: FLOW
    ══════════════════════════════ */
    #tab-flow {
      align-items: center;
      padding: 24px 20px;
    }
    .flow-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }
    .flow-node {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      position: relative;
      border-left: 4px solid transparent;
    }
    .flow-node-label {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      font-family: var(--font-mono);
    }
    .flow-node-detail {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }
    .flow-node[data-kind="endpoint"]  { border-left-color: #3b82f6; }
    .flow-node[data-kind="schema"]    { border-left-color: #06b6d4; }
    .flow-node[data-kind="service"]   { border-left-color: #14b8a6; }
    .flow-node[data-kind="repo"]      { border-left-color: #a855f7; }
    .flow-node[data-kind="orm"]       { border-left-color: #eab308; }
    .flow-node[data-kind="mapper"]    { border-left-color: #94a3b8; }
    .flow-node[data-kind="external"]  { border-left-color: #ec4899; }

    .flow-arrow {
      width: 24px;
      height: 28px;
      flex-shrink: 0;
    }

    /* ══════════════════════════════
       TAB: SEÑALES & PREGUNTAS
    ══════════════════════════════ */
    #tab-signals {
      padding: 20px;
      gap: 24px;
    }

    .signals-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .signal-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(20,184,166,0.12);
      color: var(--accent);
      border: 1px solid rgba(20,184,166,0.3);
    }

    .questions-list { display: flex; flex-direction: column; gap: 8px; }
    .question-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      align-items: flex-start;
    }
    .question-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      min-width: 18px;
      padding-top: 1px;
    }
    .question-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
    }

    /* ══════════════════════════════
       TAB: BRIEFING
    ══════════════════════════════ */
    #tab-brief {
      padding: 20px;
      gap: 16px;
    }

    .plan-copy-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .plan-copy-bar span {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
    }
    .btn-copy-md {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #000;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy-md:hover { background: var(--accent-dim); }

    #markdownRaw {
      flex: 0 0 220px;
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
    }

    .plan-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .plan-divider span {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .plan-divider::before, .plan-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .plan-preview {
      flex: 1;
      padding: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-y: auto;
    }

    /* markdown preview styles */
    .md h1, .md h2, .md h3, .md h4 {
      font-weight: 600;
      line-height: 1.3;
      margin-top: 20px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .md h1 { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 0; }
    .md h2 { font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md h3 { font-size: 14px; }
    .md h4 { font-size: 13px; }
    .md p { margin-bottom: 10px; line-height: 1.6; }
    .md ul, .md ol { margin-bottom: 10px; padding-left: 22px; }
    .md li { margin-bottom: 3px; line-height: 1.6; }
    .md code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(255,255,255,0.07);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent);
    }
    .md pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      overflow-x: auto;
      margin-bottom: 12px;
    }
    .md pre code { background: none; padding: 0; border-radius: 0; color: inherit; }
    .md strong { font-weight: 700; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 0 0 12px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <h1>Backend Agent</h1>
    </div>
    <span class="badge">refinamiento</span>
    <div class="spacer"></div>
    <a href="/docs" target="_blank">API Docs</a>
    <a href="/health" target="_blank">Health</a>
  </header>

  <div class="layout">

    <!-- ── SIDEBAR FORM ── -->
    <aside class="form-panel">
      <div class="field">
        <label>X-API-Key</label>
        <input type="password" id="apiKey" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="field">
        <label>Proyecto</label>
        <select id="project">
          <option value="">Todos</option>
          <option value="maestro">Cantera (maestro)</option>
          <option value="product development">Progresol (nanaykuna)</option>
        </select>
      </div>
      <div class="field">
        <label>Historia de usuario</label>
        <textarea id="query" placeholder="Pega aquí la historia de usuario del sprint…"></textarea>
      </div>
      <div class="field">
        <label>Imagen (opcional)</label>
        <div class="file-input-wrapper">
          <input type="file" id="imageFile" accept="image/*">
        </div>
        <img id="imagePreview" alt="preview">
      </div>
      <div class="btn-row">
        <button type="submit" id="submitBtn">Analizar</button>
        <button type="button" id="clearBtn">Limpiar</button>
        <span id="elapsed"></span>
      </div>
      <div id="metaChips" class="meta-chips" style="display:none">
        <div class="chips-label">Repos consultados</div>
        <div id="repoChips" class="chips"></div>
        <div class="chips-label" style="margin-top:6px">Archivos leídos</div>
        <div id="fileChips" class="chips"></div>
      </div>
    </aside>

    <!-- ── RIGHT PANEL ── -->
    <div class="right-panel">

      <div class="loading-bar" id="loadingBar"></div>
      <div class="error-banner" id="errorBanner"></div>
      <div class="fallback-banner" id="fallbackBanner">
        No se pudo parsear el análisis estructurado. Mostrando respuesta cruda.
      </div>

      <!-- TITLE -->
      <div class="plan-header" id="planHeader" style="display:none">
        <div class="plan-header-inner">
          <span class="plan-label">Briefing de refinamiento</span>
          <span id="planTitle"></span>
        </div>
      </div>

      <!-- TABS BAR -->
      <div class="tabs-bar" id="tabsBar" style="display:none">
        <button class="tab-btn active" data-tab="components">Componentes</button>
        <button class="tab-btn" data-tab="flow">Flow</button>
        <button class="tab-btn" data-tab="signals">Señales &amp; Preguntas</button>
        <button class="tab-btn" data-tab="brief">Briefing</button>
      </div>

      <!-- TAB CONTENT -->
      <div class="tabs-content">

        <!-- PLACEHOLDER -->
        <div class="tab-pane active" id="tab-placeholder">
          <div class="placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
            <p>Envía una historia de usuario para recibir el briefing de refinamiento</p>
          </div>
        </div>

        <!-- TAB: COMPONENTES -->
        <div class="tab-pane" id="tab-components">
          <div id="componentsContent" style="padding:20px;display:flex;flex-direction:column;gap:24px;"></div>
        </div>

        <!-- TAB: FLOW -->
        <div class="tab-pane" id="tab-flow">
          <div class="flow-container" id="flowContainer"></div>
        </div>

        <!-- TAB: SEÑALES & PREGUNTAS -->
        <div class="tab-pane" id="tab-signals">
          <div id="signalsContent" style="padding:20px;display:flex;flex-direction:column;gap:24px;"></div>
        </div>

        <!-- TAB: BRIEFING -->
        <div class="tab-pane" id="tab-brief">
          <div class="plan-copy-bar">
            <span>Markdown</span>
            <button class="btn-copy-md" id="copyMdBtn">Copiar</button>
          </div>
          <textarea id="markdownRaw" readonly></textarea>
          <div class="plan-divider"><span>Preview</span></div>
          <div class="plan-preview md" id="markdownPreview"></div>
        </div>

      </div><!-- /tabs-content -->
    </div><!-- /right-panel -->
  </div><!-- /layout -->

  <script>
  (function () {
    /* ─── state ─── */
    let analysis = null;
    let elapsedTimer = null;

    /* ─── refs ─── */
    const $ = id => document.getElementById(id);
    const apiKeyEl       = $('apiKey');
    const projectEl      = $('project');
    const queryEl        = $('query');
    const imageFileEl    = $('imageFile');
    const imagePrevEl    = $('imagePreview');
    const submitBtn      = $('submitBtn');
    const clearBtn       = $('clearBtn');
    const elapsedEl      = $('elapsed');
    const loadingBar     = $('loadingBar');
    const errorBanner    = $('errorBanner');
    const fallbackBanner = $('fallbackBanner');
    const planHeader     = $('planHeader');
    const planTitle      = $('planTitle');
    const tabsBar        = $('tabsBar');
    const tabPanes       = document.querySelectorAll('.tab-pane');
    const tabBtns        = document.querySelectorAll('.tab-btn');
    const metaChips      = $('metaChips');
    const repoChips      = $('repoChips');
    const fileChips      = $('fileChips');

    /* ─── persist API key ─── */
    const savedKey = localStorage.getItem('ba_apikey');
    if (savedKey) apiKeyEl.value = savedKey;
    apiKeyEl.addEventListener('change', () => localStorage.setItem('ba_apikey', apiKeyEl.value));

    /* ─── image preview ─── */
    let imageBase64 = null, imageMime = null;
    imageFileEl.addEventListener('change', () => {
      const file = imageFileEl.files[0];
      if (!file) { imageBase64 = null; imagePrevEl.style.display = 'none'; return; }
      imageMime = file.type || 'image/jpeg';
      const reader = new FileReader();
      reader.onload = e => {
        const result = e.target.result;
        imageBase64 = result.split(',')[1];
        imagePrevEl.src = result;
        imagePrevEl.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    /* ─── tabs ─── */
    function showTab(name) {
      tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      tabPanes.forEach(p => {
        const active = p.id === 'tab-' + name;
        p.classList.toggle('active', active);
        p.style.display = active ? 'flex' : 'none';
      });
      if (name !== 'placeholder') {
        $('tab-placeholder').style.display = 'none';
      }
    }
    tabBtns.forEach(btn => btn.addEventListener('click', () => showTab(btn.dataset.tab)));

    /* ─── clear ─── */
    clearBtn.addEventListener('click', reset);
    function reset() {
      analysis = null;
      tabsBar.style.display = 'none';
      planHeader.style.display = 'none';
      errorBanner.classList.remove('visible');
      fallbackBanner.classList.remove('visible');
      metaChips.style.display = 'none';
      loadingBar.classList.remove('active');
      tabPanes.forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
      $('tab-placeholder').classList.add('active');
      $('tab-placeholder').style.display = 'flex';
      tabBtns.forEach(b => b.classList.remove('active'));
      tabBtns[0].classList.add('active');
      elapsedEl.textContent = '';
      clearInterval(elapsedTimer);
    }

    /* ─── submit ─── */
    submitBtn.addEventListener('click', submit);
    queryEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submit();
    });

    async function submit() {
      const key = apiKeyEl.value.trim();
      const q   = queryEl.value.trim();
      if (!key) { showError('Ingresa una X-API-Key.'); return; }
      if (!q)   { showError('Escribe la historia de usuario.'); return; }

      reset();
      loadingBar.classList.add('active');
      submitBtn.disabled = true;

      const t0 = Date.now();
      elapsedEl.textContent = '0s';
      elapsedTimer = setInterval(() => {
        elapsedEl.textContent = Math.round((Date.now() - t0) / 1000) + 's';
      }, 1000);

      const body = { query: q, project: projectEl.value || null };
      if (imageBase64) { body.image_base64 = imageBase64; body.image_media_type = imageMime; }

      try {
        const res = await fetch('/api/v1/agent/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        renderResponse(data);
      } catch (err) {
        showError(err.message || 'Error de red');
      } finally {
        loadingBar.classList.remove('active');
        submitBtn.disabled = false;
        clearInterval(elapsedTimer);
      }
    }

    /* ─── render ─── */
    function renderResponse(data) {
      analysis = data.analysis || null;

      if (data.repos_consulted?.length || data.files_fetched?.length) {
        metaChips.style.display = 'flex';
        metaChips.style.flexDirection = 'column';
        repoChips.innerHTML = (data.repos_consulted || []).map(r =>
          `<span class="chip chip-repo">${esc(r)}</span>`).join('');
        fileChips.innerHTML = (data.files_fetched || []).map(f =>
          `<span class="chip chip-file">${esc(f)}</span>`).join('');
      }

      if (!analysis) {
        fallbackBanner.classList.add('visible');
        renderBriefTab(data.answer);
        planHeader.style.display = 'none';
        tabsBar.style.display = 'flex';
        tabBtns.forEach(b => {
          if (b.dataset.tab !== 'brief') b.style.display = 'none';
        });
        showTab('brief');
        return;
      }

      tabBtns.forEach(b => b.style.display = '');

      planTitle.textContent = analysis.title;
      planHeader.style.display = 'block';
      tabsBar.style.display = 'flex';

      renderComponents();
      renderFlow();
      renderSignals();
      renderBriefTab(analysis.markdown);

      showTab('components');
    }

    /* ── COMPONENTES ── */
    function renderComponents() {
      const container = $('componentsContent');
      container.innerHTML = '';

      // Repos impacted
      const reposSection = section('Repositorios involucrados');
      const cards = document.createElement('div');
      cards.className = 'repo-cards';
      (analysis.repos_impacted || []).forEach(r => {
        const card = document.createElement('div');
        card.className = 'repo-card';
        const touchClass = r.touch_type === 'MODIFICAR' ? 'badge-mod'
                         : r.touch_type === 'NUEVO'     ? 'badge-new'
                         :                                'badge-inv';
        card.innerHTML = `
          <div class="repo-card-header">
            <span class="repo-card-name">${esc(r.repo)}</span>
            <span class="badge ${touchClass}">${esc(r.touch_type)}</span>
            <span class="repo-card-project">${esc(r.project)}</span>
          </div>
          <div class="repo-card-reason">${esc(r.reason)}</div>`;
        cards.appendChild(card);
      });
      if (!analysis.repos_impacted?.length) {
        cards.innerHTML = '<span class="comp-empty">No se identificaron repos</span>';
      }
      reposSection.appendChild(cards);
      container.appendChild(reposSection);

      // Endpoints
      container.appendChild(listSection('Endpoints afectados', analysis.endpoints_affected));
      // Schemas
      container.appendChild(listSection('Schemas / DTOs', analysis.schemas_affected));
      // DB
      container.appendChild(listSection('Cambios en base de datos', analysis.db_changes));
      // External
      container.appendChild(listSection('Integraciones externas', analysis.external_integrations));
    }

    function section(title) {
      const div = document.createElement('div');
      const h = document.createElement('div');
      h.className = 'comp-section-title';
      h.textContent = title;
      div.appendChild(h);
      return div;
    }

    function listSection(title, items) {
      const div = section(title);
      const list = document.createElement('div');
      list.className = 'comp-list';
      if (items?.length) {
        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'comp-list-item';
          el.textContent = item;
          list.appendChild(el);
        });
      } else {
        const el = document.createElement('span');
        el.className = 'comp-empty';
        el.textContent = 'Ninguno identificado';
        list.appendChild(el);
      }
      div.appendChild(list);
      return div;
    }

    /* ── FLOW ── */
    function renderFlow() {
      const container = $('flowContainer');
      container.innerHTML = '';
      const nodes = analysis.flow || [];
      nodes.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = 'flow-node';
        if (n.kind) div.dataset.kind = n.kind;
        div.innerHTML = `
          <div class="flow-node-label">${esc(n.label)}</div>
          ${n.detail ? `<div class="flow-node-detail">${esc(n.detail)}</div>` : ''}`;
        container.appendChild(div);
        if (i < nodes.length - 1) {
          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('class', 'flow-arrow');
          svg.setAttribute('viewBox', '0 0 24 28');
          svg.innerHTML = `<path d="M12 0 L12 20 M6 14 L12 21 L18 14"
            stroke="#14b8a6" stroke-width="1.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>`;
          container.appendChild(svg);
        }
      });
    }

    /* ── SEÑALES & PREGUNTAS ── */
    function renderSignals() {
      const container = $('signalsContent');
      container.innerHTML = '';

      // Complexity signals
      const sigSection = section('Señales de complejidad');
      const chips = document.createElement('div');
      chips.className = 'signals-chips';
      (analysis.complexity_signals || []).forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'signal-chip';
        chip.textContent = s;
        chips.appendChild(chip);
      });
      if (!analysis.complexity_signals?.length) {
        chips.innerHTML = '<span class="comp-empty">Sin señales de complejidad identificadas</span>';
      }
      sigSection.appendChild(chips);
      container.appendChild(sigSection);

      // Open questions
      const qSection = section('Preguntas abiertas para el refinamiento');
      const qList = document.createElement('div');
      qList.className = 'questions-list';
      (analysis.open_questions || []).forEach((q, i) => {
        const item = document.createElement('div');
        item.className = 'question-item';
        item.innerHTML = `<span class="question-num">${i + 1}.</span><span class="question-text">${esc(q)}</span>`;
        qList.appendChild(item);
      });
      if (!analysis.open_questions?.length) {
        qList.innerHTML = '<span class="comp-empty">No hay preguntas abiertas</span>';
      }
      qSection.appendChild(qList);
      container.appendChild(qSection);
    }

    /* ── BRIEFING TAB ── */
    function renderBriefTab(md) {
      $('markdownRaw').value = md || '';
      $('markdownPreview').innerHTML = marked.parse(md || '');
    }

    $('copyMdBtn').addEventListener('click', () => {
      copyText($('markdownRaw').value, $('copyMdBtn'));
    });

    /* ─── helpers ─── */
    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add('visible');
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copiado ✓';
        setTimeout(() => { btn.textContent = orig; }, 1800);
      }).catch(() => {});
    }

  })();
  </script>
</body>
</html>
